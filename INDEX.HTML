<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Berry 🍓</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-light px-4">
    <a class="navbar-brand fw-bold" href="#">🍓 Happy Berry</a>
  </nav>

  <header class="text-center py-4">
    <h1 class="titulo">Inventario</h1>
    <p class="subtitulo">Encuentra prendas en segundos 💖</p>
  </header>

  <section class="container mb-4">
    <div class="row g-3">

      <div class="col-md-4">
        <input 
          type="text" 
          id="buscador" 
          class="form-control" 
          placeholder="Buscar prenda..."
        >
      </div>

      <div class="col-md-4">
        <select id="filtroCategoria" class="form-select">
          <option value="all">Todas las categorías</option>
          <option value="dress">Vestidos</option>
          <option value="blouse">Blusas</option>
          <option value="skirt">Faldas</option>
        </select>
      </div>

      <div class="col-md-4">
        <select id="filtroTalla" class="form-select">
          <option value="all">Todas las tallas</option>
          <option value="S">S</option>
          <option value="M">M</option>
          <option value="L">L</option>
        </select>
      </div>

    </div>
  </section>

  <section class="container mb-4 text-center">
    <div class="caja-estadistica p-3">
      <h4>Valor total del inventario</h4>
      <p id="valorTotal">$0</p>
    </div>
  </section>

  <section class="container mb-4">
    <div id="alertaStock" class="alert alert-danger d-none text-center">
      ⚠️ Hay productos con stock bajo
    </div>
  </section>

  <section class="container">
    <div id="contenedorProductos" class="row g-4">
    
    </div>
  </section>

  <script src="script.js"></script>

</body>
</html>
